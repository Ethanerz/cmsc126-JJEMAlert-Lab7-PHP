<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
</head>
<body>
    <!-- YOUR EXISTING INSERT FORM (UNCHANGED) -->
    <form action="DBConnector.php" method="post">
        <label for="name">Name: </label><br>
        <input type="text" maxlength="40" id="name" name="name"><br>
        <label for="age">Age: </label><br>
        <input type="number" min="1" max="99" id="age" name="age"><br>
        <label for="email">Email: </label><br>
        <input type="email" maxlength="40" id="email" name="email"><br>
        <label for="course">Course: </label><br>
        <input type="text" maxlength="40" id="course" name="course"><br>
        <label for="year">Year Level: </label><br>
        <input type="number" min="1" max="4" id="year" name="year"><br>
        <label for="grad">Graduating Status: </label><br>
        <input type="radio" id="gradyes" name="grad" value="true">
        <label for="grad">yes</label>
        <input type="radio" id="gradno" name="grad" value="false">
        <label for="grad">no</label><br>
        <label for="pic">Picture: </label><br>
        <input type="file" id="pic" name="pic"><br>
        <input type="submit" value="submit" id="submit" name="submit">
    </form>

    <hr>

    <!-- NEW: SELECT Form -->
    <h3>Search Student</h3>
    <form action="DBConnector.php" method="post">
        <input type="hidden" name="action" value="select">
        <label>Enter ID or Name: </label>
        <input type="text" name="search_term" required>
        <input type="submit" value="Search">
    </form>

    <hr>

    <!-- NEW: UPDATE Form -->
    <h3>Update Student</h3>
    <form action="DBConnector.php" method="post">
        <input type="hidden" name="action" value="update">
        <label>Student ID: </label>
        <input type="number" name="update_id" required><br>
        <label>New Name: </label>
        <input type="text" name="new_name"><br>
        <label>New Age: </label>
        <input type="number" name="new_age"><br>
        <label>New Email: </label>
        <input type="email" name="new_email"><br>
        <input type="submit" value="Update">
    </form>

    <hr>

    <!-- NEW: DELETE Form -->
    <h3>Delete Student</h3>
    <form action="DBConnector.php" method="post">
        <input type="hidden" name="action" value="delete">
        <label>Student ID to Delete: </label>
        <input type="number" name="delete_id" required>
        <input type="submit" value="Delete" onclick="return confirm('Are you sure?')">
    </form>
</body>
</html>
